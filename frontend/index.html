<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <style>
      /*
       * iOS PWA — evitar el espacio blanco inferior al reanudar la app.
       *
       * TÉCNICA: min-height extendido + padding safe-area en html.
       * Cuando iOS mueve el documento hacia arriba para acomodar el notch,
       * el html es suficientemente alto para cubrir el hueco inferior.
       * overscroll-behavior:none detiene el rubber-band sin bloquear scroll interno.
       * El fondo blanco hace invisibles cualquier flash residual bajo el nav.
       */
      html {
        min-height: calc(100% + env(safe-area-inset-top));
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background: #ffffff;
        background-attachment: fixed;
        overscroll-behavior: none;
      }
      body {
        margin: 0;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: auto;
      }
      #root {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }
    </style>
    <script>
      // Síncrono: evita flash de fondo crema al abrir la app sin sesión (WelcomePage).
      // Si no hay token el fondo arranca en verde oscuro antes de que React monte.
      try {
        if (!localStorage.getItem('simac_token')) {
          document.documentElement.style.background = '#092213';
          document.body && (document.body.style.background = '#092213');
        }
      } catch(e) {}
    </script>
    <meta name="theme-color" content="#1A5C38" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SIMAC" />
    <link rel="icon" type="image/png" href="/icono.png" />
    <link rel="apple-touch-icon" href="/icono.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <title>SIMAC — Sistema de Ordenamiento de la Producción y Comercialización del Maíz Blanco en México</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
