<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Green rounded square background -->
  <rect width="64" height="64" rx="14" fill="#1A5C38"/>

  <!-- Left husk leaf -->
  <path d="M22 46 Q4 34 12 8 Q15 26 24 42Z" fill="#2D9E56"/>
  <!-- Right husk leaf -->
  <path d="M42 46 Q60 34 52 8 Q49 26 40 42Z" fill="#2D9E56"/>

  <!-- Corn cob body (maíz blanco = cream/white) -->
  <rect x="24" y="10" width="16" height="34" rx="8" fill="#FFF8E7"/>

  <!-- Horizontal kernel rows -->
  <line x1="24.5" y1="18" x2="39.5" y2="18" stroke="#D4BF8A" stroke-width="1"/>
  <line x1="24.5" y1="24" x2="39.5" y2="24" stroke="#D4BF8A" stroke-width="1"/>
  <line x1="24.5" y1="30" x2="39.5" y2="30" stroke="#D4BF8A" stroke-width="1"/>
  <line x1="24.5" y1="36" x2="39.5" y2="36" stroke="#D4BF8A" stroke-width="1"/>

  <!-- Vertical kernel columns -->
  <line x1="29" y1="10" x2="29" y2="44" stroke="#D4BF8A" stroke-width="0.8"/>
  <line x1="32" y1="10" x2="32" y2="44" stroke="#D4BF8A" stroke-width="0.8"/>
  <line x1="35" y1="10" x2="35" y2="44" stroke="#D4BF8A" stroke-width="0.8"/>

  <!-- Silk threads at top -->
  <path d="M28 10 Q25 5 23 3" stroke="#A07830" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30 10 Q29 4 29 2" stroke="#A07830" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M32 10 Q33 4 33 2" stroke="#A07830" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M34 10 Q37 5 39 3" stroke="#A07830" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Stem at bottom -->
  <rect x="29" y="44" width="6" height="8" rx="2" fill="#4A7A2E"/>
</svg>
